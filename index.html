        // -----------------------------
        // STATE
        // -----------------------------
        let currentQuestion = 0;

        // -----------------------------
        // LOAD QUESTION
        // -----------------------------
        function loadQuestion() {
            const container = document.getElementById("quiz-container");
            container.innerHTML = "";

            let q = questions[currentQuestion];

            let qEl = document.createElement("h2");
            qEl.className = "question";
            qEl.innerText = q.q;
            container.appendChild(qEl);

            q.options.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "option";
                btn.innerText = opt.text;

                btn.onclick = () => {

                    // update traits
                    for (let key in opt.effect) {
                        traits[key] += opt.effect[key];
                    }

                    currentQuestion++;

                    // 💾 SAVE PROGRESS
                    localStorage.setItem("quiz_traits", JSON.stringify(traits));
                    localStorage.setItem("quiz_index", currentQuestion);

                    if (currentQuestion < questions.length) {
                        loadQuestion();
                    } else {
                        processResults();
                    }
                };

                container.appendChild(btn);
            });
        }

        // -----------------------------
        // NORMALIZE
        // -----------------------------
        function normalizeTraits(traits) {
            let total = 0;
            for (let t in traits) total += traits[t];

            let normalized = {};
            for (let t in traits) {
                normalized[t] = total === 0 ? 0 : traits[t] / total;
            }
            return normalized;
        }

        // -----------------------------
        // MATCHING
        // -----------------------------
        const allTraits = ["logic", "aggression", "morality", "chaos", "leadership", "curiosity"];

        function getBestMatch(userTraits, profiles) {
            let best = null;
            let minDistance = Infinity;

            for (let p of profiles) {
                let dist = 0;

                for (let t of allTraits) {
                    let diff = (userTraits[t] || 0) - (p.profile[t] || 0);
                    dist += diff * diff;
                }

                if (dist < minDistance) {
                    minDistance = dist;
                    best = p.name;
                }
            }

            return best;
        }



        // -----------------------------
        // INIT (RESTORE)
        // -----------------------------
        function initQuiz() {
            let savedTraits = localStorage.getItem("quiz_traits");
            let savedIndex = localStorage.getItem("quiz_index");

            if (savedTraits && savedIndex) {
                traits = JSON.parse(savedTraits);
                currentQuestion = parseInt(savedIndex);
            }

            loadQuestion();
        }

        initQuiz();

        // -----------------------------
        // ENCRYPTION
        // -----------------------------

        // 🔵 Caesar with RANDOM shift
        function cipher_caesar(text) {
            let shift = Math.floor(Math.random() * 5) + 2; // 2–6

            let encrypted = text.split('').map(c => {
                if (/[a-z]/i.test(c)) {
                    let base = c === c.toUpperCase() ? 65 : 97;
                    return String.fromCharCode((c.charCodeAt(0) - base + shift) % 26 + base);
                }
                return c;
            }).join('');

            return {
                text: encrypted,
                hint: `Caesar cipher (shift = ${shift})`,
                link: "https://caesar-cipher.com/?mode=decrypt"
            };
        }


        // 🟢 Reverse
        function cipher_reverse(text) {
            return {
                text: text.split("").reverse().join(""),
                hint: "Read it backwards",
                link: "https://cryptii.com/pipes/reverse-text"
            };
        }


        // 🟡 Base64
        function cipher_base64(text) {
            return {
                text: btoa(text),
                hint: "Base64 encoding",
                link: "https://cryptii.com/pipes/base64-to-text"
            };
        }


        // 🟣 Rotate
        function cipher_rot13(text) {
            let encrypted = text.split('').map(c => {
                if (/[a-z]/i.test(c)) {
                    let base = c === c.toUpperCase() ? 65 : 97;
                    return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
                }
                return c;
            }).join('');

            return {
                text: encrypted,
                hint: "ROT13 cipher",
                link: "https://cryptii.com/pipes/rot13-decoder"
            };
        }

        // 🟠 Binary
        function cipher_binary(text) {
            return {
                text: text.split('').map(c => c.charCodeAt(0).toString(2)).join(' '),
                hint: "Binary encoding",
                link: "https://www.rapidtables.com/convert/number/binary-to-ascii.html"
            };
        }
        // -----------------------------
        // FINAL RESULT
        // -----------------------------

            let retake = document.createElement("button");
            retake.innerText = "🔁 Retake Test";
            retake.className = "retake-btn";

            retake.onclick = () => {

                // reset traits
                traits = {
                    logic: 0,
                    aggression: 0,
                    morality: 0,
                    chaos: 0,
                    leadership: 0,
                    curiosity: 0
                };

                // reset question index
                currentQuestion = 0;
                // clear storage
                localStorage.removeItem("quiz_traits");
                localStorage.removeItem("quiz_index");

                // clear result screen
                document.getElementById("result-container").innerHTML = "";

                // restart quiz
                loadQuestion();
            };

            // clear saved progress
            localStorage.removeItem("quiz_traits");
            localStorage.removeItem("quiz_index");

            let normalized = normalizeTraits(traits);

            let marvel = getBestMatch(normalized, marvelCharacters);
            let hacker = getBestMatch(normalized, hackerTypes);

            let resultText =
                `You are ${marvel}\nHacker Type: ${hacker}`;

            // Encrypt

            let ciphers = [
                cipher_caesar,
                cipher_reverse,
                cipher_base64,
                cipher_rot13,
                cipher_binary
            ];

            let chosenCipher = ciphers[Math.floor(Math.random() * ciphers.length)];

            let result = chosenCipher(resultText);

            let encrypted = result.text;
            let hintText = result.hint;

            // Clear quiz
            document.getElementById("quiz-container").innerHTML = "";

            let resDiv = document.getElementById("result-container");
            resDiv.innerHTML = "";

            let enc = document.createElement("div");
            enc.id = "encrypted-output";
            enc.innerText = encrypted;
